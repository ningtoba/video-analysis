[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "video-analysis"
version = "0.3.0"
description = "Self-hosted video analysis platform with AI chatbot — scene understanding, RAG, clip export"
readme = "README.md"
authors = [
    {name = "Hermes Agent"},
]
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "gradio>=6.0.0",
    "faster-whisper>=1.0.0",
    "opencv-python>=4.9.0",
    "pillow>=10.0.0",
    "chromadb>=1.5.0",
    "sentence-transformers>=2.5.0",
    "transformers>=4.40.0",
    "torch>=2.1.0",
    "torchvision>=0.16.0",
    "langchain-text-splitters>=0.1.0",
    "open-clip-torch>=2.24.0",
]

[project.scripts]
video-analysis = "video_analysis.__main__:main"

[tool.setuptools.packages.find]
include = ["video_analysis*"]
