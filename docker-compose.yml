# ── docker-compose.yml for video-analysis ──
# Single container: faster-whisper ASR + LLM Vision API
#
# Usage:
#   docker compose up -d
#   Then configure at http://localhost:7860/settings

services:
  video-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-analysis:latest
    container_name: video-analysis
    restart: unless-stopped

    ports:
      - "7860:7860"

    volumes:
      - ./data:/app/data

    # ── Webcam passthrough (for live stream) ──
    devices:
      - /dev/video0:/dev/video0

    environment:
      - PYTHONUNBUFFERED=1

    # ── GPU support (NVIDIA) ──
    # Comment this block out on systems without NVIDIA GPUs.
    # Requires nvidia-container-toolkit:
    #   sudo apt install nvidia-container-toolkit && sudo systemctl restart docker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:7860/health', timeout=5); exit(0) if r.status==200 else exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
