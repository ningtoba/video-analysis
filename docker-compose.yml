# ── docker-compose.yml for video-analysis ──
# Single container: faster-whisper ASR + LLM Vision API for all vision tasks
#
# Usage:
#   docker compose up -d
#
# You MUST set LLM_API_KEY (or ANTHROPIC_API_KEY / GEMINI_API_KEY)
# in your environment or in a .env file:
#   echo "LLM_API_KEY=sk-..." >> .env
#   docker compose up -d

services:
  video-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-analysis:latest
    container_name: video-analysis
    restart: unless-stopped

    ports:
      - "7860:7860"

    volumes:
      - ./data:/app/data

    environment:
      # ── LLM Provider (required — at least one API key) ──
      # Options: openai, anthropic, gemini, deepseek, ollama
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}

      # ── Anthropic (alternative) ──
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

      # ── Gemini (alternative) ──
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}

      # ── ASR (auto-selects based on VRAM) ──
      # Set WHISPER_MODEL to "tiny"/"base"/"small"/"medium"/"large-v3-turbo"/"large-v3" to override
      - WHISPER_MODEL=${WHISPER_MODEL:-auto}

      # ── Frame extraction ──
      - FRAME_RATE=${FRAME_RATE:-0.2}
      - MAX_FRAMES_FOR_LLM=${MAX_FRAMES_FOR_LLM:-30}

      # ── Server ──
      - HOST=0.0.0.0
      - PORT=7860

      # ── Python ──
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    # ── GPU support (optional) ──
    # Uncomment for NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:7860/health', timeout=5); exit(0) if r.status==200 else exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
