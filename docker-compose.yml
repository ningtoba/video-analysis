# ── docker-compose.yml for video-analysis ──
# Single container: faster-whisper ASR + LLM Vision API for all vision tasks
#
# Usage:
#   docker compose up -d
#
# All configuration is now UI-driven via web UI at /settings.
# No environment variables or .env file are needed for setup.

services:
  video-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-analysis:latest
    container_name: video-analysis
    restart: unless-stopped

    ports:
      - "7860:7860"

    volumes:
      - ./data:/app/data

    environment:
      # All configuration via web UI at /settings
      - PYTHONUNBUFFERED=1

    # ── GPU support (optional) ──
    # Uncomment for NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; r=urllib.request.urlopen('http://localhost:7860/health', timeout=5); exit(0) if r.status==200 else exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
