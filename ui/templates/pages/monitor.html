<div class="card mb-md">
  <div class="flex items-center justify-between">
    <h3 class="mb-0">📊 System Metrics</h3>
    <button class="btn btn-secondary btn-sm"
            hx-get="/api/health/runs" hx-target="#monitor-metrics" hx-swap="innerHTML">
      🔄 Refresh
    </button>
  </div>
</div>
<div id="monitor-metrics" hx-get="/api/health/runs" hx-trigger="load" hx-swap="innerHTML">
  <div class="text-center" style="padding:var(--space-2xl);">
    <span class="spinner"></span> <span class="text-muted text-sm">Loading metrics...</span>
  </div>
</div>

<div class="card mt-md">
  <h3>🧪 Run Evaluation</h3>
  <form hx-post="/api/evaluations/compare" hx-target="#eval-result" hx-swap="innerHTML"
        class="flex gap-sm items-end">
    <div style="flex:1;">
      <label class="text-xs text-muted">Task names (comma-separated)</label>
      <input type="text" name="task_names" placeholder="retrieval_precision, scene_boundary_accuracy">
    </div>
    <button type="submit" class="btn btn-primary">Run Evaluation</button>
  </form>
  <div id="eval-result" class="mt-sm"></div>
</div>
