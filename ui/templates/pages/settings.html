<div x-data="{ cfg: {}, loaded: false, saved: false, saving: false }"
     x-init="fetch('/api/config').then(r=>r.json()).then(d=>{cfg=d;loaded=true})">
  <div class="card mb-md">
    <div class="flex items-center justify-between">
      <div>
        <h3 class="mb-0">⚙️ Settings</h3>
        <p class="text-muted text-sm mt-sm mb-0">Configure models, features, and processing parameters. Changes are saved immediately and take effect on the next pipeline run.</p>
      </div>
      <button class="btn btn-primary" @click="saving=true;fetch('/api/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}).then(r=>r.json()).then(d=>{cfg=d;saving=false;saved=true;setTimeout(()=>saved=false,2000)})">
        <span x-show="!saving && !saved">💾 Save</span>
        <span x-show="saving"><span class="spinner"></span> Saving...</span>
        <span x-show="saved">✓ Saved!</span>
      </button>
    </div>
  </div>

  <div x-show="!loaded" class="card text-center" style="padding:var(--space-2xl);">
    <span class="spinner"></span> <span class="text-muted text-sm">Loading settings...</span>
  </div>

  <div x-show="loaded" class="grid-2">
    <!-- Processing -->
    <div class="card">
      <h4>🎬 Processing</h4>
      <div class="flex flex-col gap-sm">
        <label class="text-xs text-muted">Whisper Model
          <select x-model="cfg.whisper_model" class="mt-xs">
            <option value="large-v3">large-v3</option>
            <option value="large-v2">large-v2</option>
            <option value="medium">medium</option>
            <option value="small">small</option>
            <option value="tiny">tiny</option>
          </select></label>
        <label class="text-xs text-muted">Whisper Device
          <select x-model="cfg.whisper_device" class="mt-xs">
            <option value="cuda">cuda (GPU)</option>
            <option value="cpu">cpu</option>
          </select></label>
        <label class="text-xs text-muted">Compute Type
          <select x-model="cfg.whisper_compute_type" class="mt-xs">
            <option value="int8_float16">int8_float16 (fast)</option>
            <option value="int8">int8</option>
            <option value="float16">float16</option>
          </select></label>
        <label class="text-xs text-muted">Frame Rate <input type="number" x-model="cfg.frame_rate" step="0.1" min="0.1" max="10" class="mt-xs"></label>
        <label class="text-xs text-muted">Scene Detector
          <select x-model="cfg.scene_detector" class="mt-xs">
            <option value="adaptive">adaptive</option>
            <option value="content">content</option>
            <option value="ffmpeg">ffmpeg</option>
            <option value="hash">hash</option>
          </select></label>
        <label class="text-xs text-muted">Scene Threshold <input type="number" x-model="cfg.scene_threshold" step="0.05" min="0.1" max="1.0" class="mt-xs"></label>
        <label class="text-xs text-muted">Processing Mode
          <select x-model="cfg.processing_mode" class="mt-xs">
            <option value="auto">auto</option>
            <option value="video_full">video_full</option>
            <option value="audio_only">audio_only</option>
          </select></label>
      </div>
    </div>

    <!-- CV -->
    <div class="card">
      <h4>👁️ Computer Vision</h4>
      <div class="flex flex-col gap-sm">
        <label class="text-xs text-muted">CLIP Model
          <select x-model="cfg.clip_model" class="mt-xs">
            <option value="ViT-B-32">ViT-B-32 (fast, 512d)</option>
            <option value="ViT-L-14">ViT-L-14 (accurate, 768d)</option>
          </select></label>
        <label class="text-xs text-muted">YOLO Model
          <select x-model="cfg.yolo_model" class="mt-xs">
            <option value="yolo26x.pt">YOLO26x (best)</option>
            <option value="yolo26m.pt">YOLO26m (balanced)</option>
            <option value="yolo26n.pt">YOLO26n (fast)</option>
          </select></label>
        <label class="text-xs text-muted">YOLO Confidence <input type="number" x-model="cfg.yolo_confidence" step="0.05" min="0.1" max="1.0" class="mt-xs"></label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.entity_tracking_enabled"> Entity Tracking (ByteTrack)</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.face_recognition_enabled"> Face Recognition</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.action_recognition_enabled"> Action Recognition (X-CLIP)</label>
      </div>
    </div>

    <!-- RAG -->
    <div class="card">
      <h4>🧠 RAG & Retrieval</h4>
      <div class="flex flex-col gap-sm">
        <label class="text-xs text-muted">Embedding Model
          <select x-model="cfg.embedding_model" class="mt-xs">
            <option value="BAAI/BGE-VL-base">BGE-VL-base (multimodal, 150M)</option>
            <option value="nomic-ai/nomic-embed-text-v1.5">Nomic Embed Text v1.5</option>
          </select></label>
        <label class="text-xs text-muted">Top-K Retrieval <input type="number" x-model="cfg.top_k_retrieval" min="5" max="100" class="mt-xs"></label>
        <label class="text-xs text-muted">Top-K Rerank <input type="number" x-model="cfg.top_k_rerank" min="1" max="20" class="mt-xs"></label>
        <label class="text-xs text-muted">Temporal Window <input type="number" x-model="cfg.temporal_window" min="0" max="10" class="mt-xs"></label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.mmr_diversity_enabled"> MMR Diversity Re-Ranking</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.multimodal_embedding_enabled"> Multimodal Embedding (Qwen3-VL)</label>
      </div>
    </div>

    <!-- MLLM -->
    <div class="card">
      <h4>🤖 Video MLLM</h4>
      <div class="flex flex-col gap-sm">
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.video_mllm_enabled"> Enable Video MLLM</label>
        <label class="text-xs text-muted">Backend
          <select x-model="cfg.video_mllm_backend" class="mt-xs">
            <option value="qwen3_vl">Qwen3-VL (Apache 2.0)</option>
            <option value="internvideo3">InternVideo3 (SOTA)</option>
            <option value="videochat_flash">VideoChat-Flash (MIT)</option>
            <option value="smolvlm2">SmolVLM2 (Apache 2.0)</option>
          </select></label>
        <label class="text-xs text-muted">Model Size
          <select x-model="cfg.video_mllm_model_size" class="mt-xs">
            <option value="30B">30B (MoE, 3B active)</option>
            <option value="8B">8B</option>
            <option value="2B">2B</option>
            <option value="500M">500M (lightweight)</option>
          </select></label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.video_mllm_as_describer"> Use as scene describer</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.video_mllm_as_chat_backend"> Use as chat backend</label>
      </div>
    </div>

    <!-- Features -->
    <div class="card">
      <h4>🔧 Features</h4>
      <div class="flex flex-col gap-sm">
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.quality_screening_enabled"> Quality Pre-Screening</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.adaptive_scaling_enabled"> Adaptive Pipeline Scaling</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.event_causal_rag_enabled"> Event-Causal RAG</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.conversation_memory_enabled"> Conversation Memory</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.agent_enabled"> Agentic Video Agent</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.orchestra_enabled"> Multi-Agent Orchestra</label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.prometheus_enabled"> Prometheus Metrics</label>
      </div>
    </div>

    <!-- Storage -->
    <div class="card">
      <h4>📁 Storage & Paths</h4>
      <div class="flex flex-col gap-sm">
        <label class="text-xs text-muted">Data Directory <input type="text" x-model="cfg.data_dir" class="mt-xs"></label>
        <label class="text-xs text-muted">Frame Storage
          <select x-model="cfg.frame_storage_mode" class="mt-xs">
            <option value="tiered">tiered (960px/320px)</option>
            <option value="full">full resolution</option>
            <option value="compressed">compressed (DINOv2)</option>
          </select></label>
        <label class="text-xs text-muted">Rate Limit <input type="number" x-model="cfg.rate_limit_capacity" class="mt-xs"></label>
        <label class="flex items-center gap-sm text-xs text-muted"><input type="checkbox" x-model="cfg.rate_limit_enabled"> Enable Rate Limiting</label>
      </div>
    </div>
  </div>
</div>
