<div class="grid-2" x-data="{ vid: '', vpath: '', busy: false }" @va:video-ready.window="vid=$event.detail.videoId;vpath=$event.detail.videoPath;busy=false">
  <!-- LEFT -->
  <div>
    <div class="card mb-md">
      <h3>📹 Upload a Video</h3>
      <p class="text-muted text-sm">Upload a file, paste a URL, or drag & drop. Processing runs entirely on your hardware.</p>
      <form hx-post="/api/videos/process"
            hx-encoding="multipart/form-data"
            hx-target="#progress"
            hx-swap="innerHTML"
            @submit="busy=true">
        <input type="file" name="file" accept="video/*,.mkv,.webm,.mov,.avi"
               style="padding:0.6rem;background:var(--surface-alt);border:2px dashed var(--border);border-radius:var(--radius-md);width:100%;cursor:pointer;margin-bottom:var(--space-sm);">
        <div style="display:flex;align-items:center;gap:var(--space-sm);margin:var(--space-sm) 0;color:var(--text-muted);font-size:var(--text-xs);">
          <span style="flex:1;height:1px;background:var(--border);"></span><span>or paste URL</span><span style="flex:1;height:1px;background:var(--border);"></span>
        </div>
        <input type="url" name="url" placeholder="https://www.youtube.com/watch?v=..."
               style="margin-bottom:var(--space-sm);" x-ref="urlInput">
        <button type="submit" class="btn btn-primary btn-lg w-full" :disabled="busy">
          ⚡ Analyze Video
        </button>
      </form>
    </div>

    <div id="progress" class="mb-md"></div>

    <div x-show="vid" class="card mb-md" style="padding:0;overflow:hidden;">
      <video :src="'/data/videos/' + vid + '.mp4'" controls
             style="width:100%;max-height:380px;background:#000;" id="player"></video>
    </div>

    <div x-show="vid" class="card">
      <h4>✂️ Export Clip</h4>
      <div class="flex gap-sm items-end flex-wrap">
        <div><label class="text-xs text-muted">Start (s)</label><input type="number" id="cs" value="0" min="0" style="width:90px;"></div>
        <div><label class="text-xs text-muted">End (s)</label><input type="number" id="ce" value="10" min="0" style="width:90px;"></div>
        <button class="btn btn-primary btn-sm" hx-post="/analysis/export-clip" hx-include="#cs,#ce" hx-target="#clipr" hx-swap="innerHTML">✂️ Export</button>
      </div>
      <div id="clipr" class="mt-sm"></div>
    </div>
  </div>

  <!-- RIGHT: Chat -->
  <div>
    <div class="card" style="display:flex;flex-direction:column;height:620px;">
      <h3>💬 Ask Questions</h3>
      <div id="chat-msgs" class="overflow-auto flex-1" style="display:flex;flex-direction:column;gap:var(--space-md);padding:var(--space-sm) 0;">
        <div class="text-center text-muted text-sm" id="chat-empty" style="padding:var(--space-2xl);">
          <p style="font-size:3rem;margin:0;">🎥</p>
          <p>Upload a video to start asking questions.<br>AI will analyze scenes, objects, transcript, and more.</p>
        </div>
      </div>
      <form hx-post="/analysis/chat" hx-target="#chat-msgs" hx-swap="beforeend"
            @submit="document.getElementById('chat-empty')?.remove()"
            style="border-top:1px solid var(--border);padding-top:var(--space-md);">
        <input type="hidden" name="video_id" :value="vid">
        <div class="flex gap-sm">
          <input type="text" name="message" placeholder="What happens in this video? What objects are visible?"
                 style="flex:1;" autocomplete="off" :disabled="!vid">
          <button type="submit" class="btn btn-primary" :disabled="!vid">Send ➤</button>
        </div>
        <div class="flex gap-sm items-center mt-sm">
          <label class="text-xs text-muted"><input type="checkbox" name="show_sources" value="true" checked> Show sources</label>
          <button type="button" class="btn btn-secondary btn-sm" style="margin-left:auto;"
                  hx-post="/analysis/chat/clear" hx-target="#chat-msgs" hx-swap="innerHTML">Clear Chat</button>
        </div>
      </form>
    </div>
  </div>
</div>
