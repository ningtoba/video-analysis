<!-- Events Tab — event-causal timeline -->
<div>
  <div class="card mb-md">
    <div class="flex items-center justify-between flex-wrap gap-sm">
      <h3 class="mb-0">⏱ Event-Causal Timeline</h3>
      <div class="flex gap-sm items-center">
        <button class="btn btn-secondary btn-sm"
                hx-post="/api/kg/timeline" hx-target="#events-content" hx-swap="innerHTML">
          🔄 Refresh
        </button>
      </div>
    </div>
  </div>

  <div id="events-content" hx-get="/api/kg/timeline" hx-trigger="load" hx-swap="innerHTML">
    <div class="card text-center" style="padding:var(--space-2xl);">
      <span class="spinner"></span>
      <p class="text-muted text-sm mt-sm">Loading event timeline...</p>
    </div>
  </div>

  <div class="card mt-md">
    <h4>💬 Event-Level Q&A</h4>
    <form hx-get="/api/videos/search"
          hx-target="#events-qa-result"
          hx-swap="innerHTML"
          class="flex gap-sm">
      <input type="text" name="query" placeholder="Ask about events, e.g. 'when does the conversation shift to...'" style="flex:1;">
      <button type="submit" class="btn btn-primary">Ask</button>
    </form>
    <div id="events-qa-result" class="mt-sm text-sm"></div>
  </div>
</div>
