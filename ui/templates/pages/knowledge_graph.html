<!-- Knowledge Graph Tab — populated from KG API endpoints -->
<div class="grid-2">
  <div>
    <div class="card" id="kg-stats-panel" hx-get="/api/kg/stats" hx-trigger="load" hx-swap="innerHTML">
      <h4>🧠 Knowledge Graph Stats</h4>
      <span class="spinner"></span> <span class="text-muted text-sm">Loading...</span>
    </div>
    <div class="card mt-md" id="kg-timeline-panel" hx-get="/api/kg/timeline" hx-trigger="load" hx-swap="innerHTML">
      <h4>📅 Timeline</h4>
      <span class="spinner"></span> <span class="text-muted text-sm">Loading...</span>
    </div>
  </div>
  <div>
    <div class="card">
      <h4>🔍 Search Entities</h4>
      <form hx-get="/api/kg/entities" hx-target="#kg-results" hx-swap="innerHTML"
            class="flex flex-col gap-sm">
        <input type="text" name="query" placeholder="e.g. Alice, car, running...">
        <select name="type">
          <option value="">All types</option>
          <option value="person">Person</option>
          <option value="object">Object</option>
          <option value="action">Action</option>
          <option value="location">Location</option>
          <option value="concept">Concept</option>
          <option value="event">Event</option>
        </select>
        <button type="submit" class="btn btn-primary">Search</button>
      </form>
      <div id="kg-results" class="mt-md text-sm"></div>
    </div>
    <div class="card mt-md" id="kg-context-panel" hx-get="/api/kg/context" hx-trigger="load" hx-swap="innerHTML">
      <h4>📝 LLM Context</h4>
      <span class="spinner"></span> <span class="text-muted text-sm">Loading...</span>
    </div>
  </div>
</div>
