<div class="card">
  <h3>🌐 Import Video from URL</h3>
  <p class="text-muted text-sm">Download and analyze any video from YouTube, Vimeo, or direct URL.</p>
  <form hx-post="/analysis/process-url"
        hx-target="#import-progress"
        hx-swap="innerHTML"
        hx-indicator="#import-spinner"
        class="flex flex-col gap-sm">
    <input type="url" name="url" placeholder="https://www.youtube.com/watch?v=..."
           style="font-size:var(--text-base);padding:0.75rem;">
    <div class="flex gap-sm">
      <button type="submit" class="btn btn-primary btn-lg" style="flex:2;">⬇️ Download & Analyze</button>
      <button type="reset" class="btn btn-secondary">🗑 Clear</button>
    </div>
  </form>
  <div id="import-spinner" class="htmx-indicator mt-sm text-center">
    <span class="spinner"></span> <span class="text-sm text-muted">Downloading...</span>
  </div>
  <div id="import-progress" class="mt-md"></div>
  <div id="import-result" class="mt-md"></div>
</div>
