<div class="card">
  <h3>📷 Live Camera</h3>
  <p class="text-muted text-sm">Capture frames from your webcam and analyze them with real-time object detection.</p>
  <div class="flex gap-sm mb-md">
    <button class="btn btn-primary" onclick="startCamera(document.getElementById('cam-video')); this.nextElementSibling.disabled = false;">
      ▶️ Start Camera
    </button>
    <button class="btn btn-secondary" disabled onclick="stopCamera(); this.previousElementSibling.disabled = false; this.disabled = true;">
      ⏹️ Stop
    </button>
    <button class="btn btn-primary"
            hx-post="/api/camera/capture" hx-target="#cam-results" hx-swap="innerHTML">
      📸 Capture & Analyze
    </button>
  </div>
  <div class="camera-feed">
    <video id="cam-video" autoplay playsinline muted style="width:100%;max-height:360px;background:#000;"></video>
  </div>
  <div id="cam-results" class="camera-results mt-md"></div>
</div>
<script src="/static/js/camera.js"></script>
