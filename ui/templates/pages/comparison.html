<div class="card">
  <div class="flex items-center justify-between mb-md">
    <h3 class="mb-0">📈 Evaluation Comparison</h3>
    <button class="btn btn-secondary btn-sm"
            hx-post="/api/evaluations/compare" hx-target="#comp-list" hx-swap="innerHTML">
      🔄 Refresh Reports
    </button>
  </div>
  <div id="comp-list">
    <p class="text-muted text-sm">Loading report list...</p>
  </div>
  <form hx-post="/comparison/compare" hx-target="#comp-results" hx-swap="innerHTML"
        class="flex gap-sm mt-md">
    <input type="text" name="report_ids" placeholder="Report IDs (space or comma separated)"
           style="flex:1;">
    <button type="submit" class="btn btn-primary">📊 Compare</button>
  </form>
  <div id="comp-results" class="mt-md"></div>
</div>
