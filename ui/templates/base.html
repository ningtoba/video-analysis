<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Video Analysis{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
  <link rel="stylesheet" href="/static/css/dark-theme.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://unpkg.com/htmx-ext-ws@2.0.2/ws.js" defer></script>
  <script src="/static/js/app.js" defer></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <script src="/static/js/timeline.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body class="app-layout" x-data="appState">
  <header class="container">
    <div class="flex items-center justify-between flex-wrap gap-sm" style="padding:var(--space-md) 0;">
      <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:var(--space-sm);">
        <img src="/static/img/logo.svg" width="28" height="28" alt="">
        <span style="font-size:var(--text-lg);font-weight:700;color:var(--text);">Video Analysis</span>
      </a>
      <nav class="flex gap-sm">
        <button class="tab-btn" :class="{ active: activeTab === 'analyze' }" @click="switchTab('analyze')">📹 Analyze</button>
        <button class="tab-btn" :class="{ active: activeTab === 'library' }" @click="switchTab('library')">📚 Library</button>
        <button class="tab-btn" :class="{ active: activeTab === 'camera' }" @click="switchTab('camera')">📷 Camera</button>
        <button class="tab-btn" :class="{ active: activeTab === 'settings' }" @click="switchTab('settings')">⚙️ Settings</button>
      </nav>
    </div>
  </header>

  <main class="container app-main" style="padding-bottom:var(--space-2xl);">
    <div x-show="activeTab === 'analyze'" x-cloak>{% block analyze_tab %}{% endblock %}</div>
    <div x-show="activeTab === 'library'" x-cloak>{% block library_tab %}{% endblock %}</div>
    <div x-show="activeTab === 'camera'" x-cloak>{% block camera_tab %}{% endblock %}</div>
    <div x-show="activeTab === 'settings'" x-cloak>{% block settings_tab %}{% endblock %}</div>
  </main>

  <footer class="container text-center text-muted" style="font-size:var(--text-xs);padding:var(--space-md) 0;">
    Video Analysis Platform v{{ version }} — All processing runs locally
  </footer>

  <div class="toast-container" id="toasts" x-data="{toasts:[]}" @new-toast.window="toasts.push($event.detail);setTimeout(()=>toasts.shift(),4000)">
    <template x-for="t in toasts" :key="t.id"><div class="toast" :class="t.type" x-text="t.message"></div></template>
  </div>
</body>
</html>
