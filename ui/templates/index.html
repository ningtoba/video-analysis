<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 0; background: #0f1117; }
        .navbar { background: #1a1d23 !important; border-bottom: 1px solid #2a2d35; }
        .navbar .nav-link { color: #8b8fa3 !important; }
        .navbar .nav-link:hover, .navbar .nav-link.active { color: #0dcaf0 !important; }
        .card { background: #1a1d23; border-color: #2a2d35; }
        .video-card { cursor: pointer; transition: transform 0.1s; }
        .video-card:hover { transform: translateY(-2px); background: #22252b; }
        .video-card.selected { background: #0dcaf0 !important; color: #000; }
        #chat-box { height: 400px; overflow-y: auto; background: #12141a; border-radius: 8px; padding: 16px; }
        .msg-user { color: #0dcaf0; }
        .msg-assistant { color: #adb5bd; }
        .loading { opacity: 0.6; pointer-events: none; }
        pre { white-space: pre-wrap; }
        .list-group-item { background: transparent; border-color: #2a2d35; }
        .form-control, .form-select { background: #0f1117; border-color: #2a2d35; color: #e0e0e0; }
        .form-control:focus, .form-select:focus { background: #0f1117; border-color: #0dcaf0; color: #e0e0e0; box-shadow: 0 0 0 0.2rem rgba(13,202,240,0.15); }
        .form-control::placeholder { color: #6c7293; }
        .btn-primary { background: #0dcaf0; border-color: #0dcaf0; color: #000; font-weight: 600; }
        .btn-primary:hover { background: #0bb7d9; border-color: #0bb7d9; color: #000; }
        .btn-outline-info { border-color: #0dcaf0; color: #0dcaf0; }
        .btn-outline-info:hover { background: #0dcaf0; color: #000; }
        .badge-processing { background: #ffc107; color: #000; }
        .badge-complete { background: #198754; }
        .badge-error { background: #dc3545; }
        #upload-progress { transition: all 0.3s; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 px-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">&#x1f3a5; Video Analysis</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="/">Home</a>
                <a class="nav-link" href="/settings">Settings</a>
                <a class="nav-link" href="/models">Models</a>
            </div>
            <span class="badge bg-secondary ms-3" id="status-badge">Starting...</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3">
            <!-- Left column: Upload + Library -->
            <div class="col-md-4">
                <!-- Upload card -->
                <div class="card border-secondary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Upload Video</h5>
                        <form id="upload-form">
                            <div class="mb-2">
                                <input type="file" class="form-control form-control-sm" id="video-file" accept="video/*">
                            </div>
                            <div class="text-muted small mb-1">Or paste a YouTube URL:</div>
                            <div class="mb-2">
                                <input type="url" class="form-control form-control-sm" id="youtube-url" placeholder="https://youtube.com/watch?v=...">
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-100" id="upload-btn">
                                <span id="upload-btn-text">Process</span>
                                <span id="upload-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                        </form>
                        <div id="upload-progress" class="mt-2 small" style="display:none;"></div>
                    </div>
                </div>

                <!-- Library card -->
                <div class="card border-secondary">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="card-title mb-0">Video Library</h5>
                            <button class="btn btn-sm btn-outline-secondary" onclick="loadVideos()" title="Refresh">&#x21bb;</button>
                        </div>
                        <div id="video-list" class="list-group list-group-flush" style="max-height: 500px; overflow-y: auto;">
                            <div class="text-muted small py-2">No videos yet</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right column: Video details + Chat -->
            <div class="col-md-8">
                <div class="card border-secondary">
                    <div class="card-body">
                        <h5 class="card-title" id="video-title">Select a video</h5>
                        <div id="video-info" class="small text-muted mb-2"></div>
                        <div id="video-summary" class="mb-3 small"></div>

                        <h6 class="mt-3">Chat about this video</h6>
                        <div id="chat-box">
                            <div class="text-muted small">Process a video to start asking questions.</div>
                        </div>
                        <form id="chat-form" class="mt-2">
                            <div class="input-group">
                                <input type="text" class="form-control form-control-sm" id="chat-input" placeholder="Ask about the video..." disabled>
                                <button class="btn btn-sm btn-outline-info" type="submit" disabled>Ask</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    let currentVideoId = null;
    let appSettings = {};

    // ── Health check ──────────────────────────────────────────────────
    fetch('/api/health').then(r => r.json()).then(d => {
        document.getElementById('status-badge').textContent = d.status === 'ok' ? 'Online' : 'Error';
        document.getElementById('status-badge').className = 'badge bg-success ms-3';
    }).catch(() => {
        document.getElementById('status-badge').textContent = 'Offline';
        document.getElementById('status-badge').className = 'badge bg-danger ms-3';
    });

    // ── Load settings on startup ──────────────────────────────────────
    async function loadSettings() {
        try {
            const res = await fetch('/api/settings');
            appSettings = await res.json();
        } catch (e) {
            console.warn('Failed to load settings:', e);
        }
    }
    loadSettings();

    // ── Video library ─────────────────────────────────────────────────
    async function loadVideos() {
        try {
            const res = await fetch('/api/videos');
            const videos = await res.json();
            const list = document.getElementById('video-list');
            if (videos.length === 0) {
                list.innerHTML = '<div class="text-muted small py-2">No videos yet</div>';
                return;
            }
            list.innerHTML = videos.map(v => {
                const isSelected = v.video_id === currentVideoId;
                const statusClass = v.has_analysis ? 'bg-success' : 'bg-warning text-dark';
                const statusText = v.has_analysis ? 'Done' : 'Proc.';
                return `
                    <button class="list-group-item list-group-item-action video-card${isSelected ? ' selected' : ''}"
                            onclick="selectVideo('${v.video_id}')">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-truncate me-2">${v.filename}</small>
                            <span class="badge ${statusClass} flex-shrink-0">${statusText}</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <small class="text-muted">${v.duration.toFixed(0)}s</small>
                            <small class="text-muted">${v.num_frames} frames</small>
                        </div>
                    </button>
                `;
            }).join('');
        } catch(e) {
            console.error('Failed to load videos', e);
        }
    }
    loadVideos();

    // ── Select video ──────────────────────────────────────────────────
    async function selectVideo(videoId) {
        currentVideoId = videoId;
        document.getElementById('chat-input').disabled = false;
        document.querySelector('#chat-form button').disabled = false;

        try {
            const res = await fetch(`/api/videos/${videoId}`);
            const v = await res.json();

            document.getElementById('video-title').textContent = v.filename || videoId;
            document.getElementById('video-info').innerHTML = `
                Duration: ${(v.duration || 0).toFixed(1)}s |
                Transcript: ${(v.transcript || []).length} segments |
                Frames: ${(v.frames || []).length}
            `;
            document.getElementById('video-summary').innerHTML = v.llm_summary
                ? `<strong>Summary:</strong><br>${v.llm_summary.replace(/\n/g, '<br>')}`
                : '';
            document.getElementById('chat-box').innerHTML = '<div class="text-muted small">Ask a question about this video.</div>';

            // Highlight selected
            document.querySelectorAll('.video-card').forEach(el => el.classList.remove('selected'));
            const selected = Array.from(document.querySelectorAll('.video-card')).find(el =>
                el.getAttribute('onclick') && el.getAttribute('onclick').includes(videoId)
            );
            if (selected) selected.classList.add('selected');
        } catch(e) {
            console.error('Failed to load video', e);
        }
    }

    // ── Upload form ───────────────────────────────────────────────────
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = document.getElementById('video-file').files[0];
        const url = document.getElementById('youtube-url').value.trim();
        const btn = document.getElementById('upload-btn');
        const btnText = document.getElementById('upload-btn-text');
        const spinner = document.getElementById('upload-spinner');
        const progress = document.getElementById('upload-progress');

        if (!file && !url) return;

        // Disable button and show spinner
        btn.disabled = true;
        spinner.classList.remove('d-none');
        if (url) {
            // YouTube URL mode — first import, then process
            progress.style.display = 'block';
            progress.className = 'mt-2 small text-info';
            progress.textContent = 'Downloading video from URL...';

            try {
                const importRes = await fetch('/api/import-url', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url }),
                });
                if (!importRes.ok) {
                    const err = await importRes.json().catch(() => ({}));
                    throw new Error(err.detail || 'Import failed');
                }
                const importData = await importRes.json();

                progress.textContent = 'Processing video...';

                const processRes = await fetch('/api/videos/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        video_path: importData.path,
                        video_id: importData.video_id,
                    })
                });
                const result = await processRes.json();
                if (result.status === 'complete') {
                    progress.className = 'mt-2 small text-success';
                    progress.textContent = 'Complete!';
                    loadVideos();
                    selectVideo(result.video_id);
                } else {
                    progress.className = 'mt-2 small text-danger';
                    progress.textContent = result.error || 'Processing failed';
                }
            } catch(e) {
                progress.className = 'mt-2 small text-danger';
                progress.textContent = 'Error: ' + e.message;
            }
        } else if (file) {
            // File upload
            const formData = new FormData();
            formData.append('file', file);

            progress.style.display = 'block';
            progress.className = 'mt-2 small text-info';
            progress.textContent = 'Uploading...';

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();

                progress.textContent = 'Processing video...';

                const processRes = await fetch('/api/videos/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        video_path: data.path,
                        video_id: data.video_id,
                    })
                });
                const result = await processRes.json();

                if (result.status === 'complete') {
                    progress.className = 'mt-2 small text-success';
                    progress.textContent = 'Complete!';
                } else {
                    progress.className = 'mt-2 small text-danger';
                    progress.textContent = result.error || 'Processing failed';
                }
                loadVideos();
                if (result.video_id) selectVideo(result.video_id);
            } catch(e) {
                progress.className = 'mt-2 small text-danger';
                progress.textContent = 'Error: ' + e.message;
            }
        }

        btn.disabled = false;
        spinner.classList.add('d-none');
    });

    // ── Chat form ─────────────────────────────────────────────────────
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentVideoId) return;

        const input = document.getElementById('chat-input');
        const question = input.value.trim();
        if (!question) return;

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg-user"><strong>You:</strong> ${question}</div>`;
        input.value = '';
        chatBox.innerHTML += `<div class="msg-assistant"><em>Thinking...</em></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const formData = new FormData();
            formData.append('question', question);
            formData.append('video_id', currentVideoId);

            const res = await fetch('/api/chat', { method: 'POST', body: formData });
            const data = await res.json();

            // Replace "Thinking..." placeholder
            const thinking = chatBox.querySelector('.msg-assistant:last-child');
            if (thinking) thinking.remove();
            chatBox.innerHTML += `<div class="msg-assistant"><strong>AI:</strong> ${(data.answer || data.error || 'No response').replace(/\n/g, '<br>')}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {
            const thinking = chatBox.querySelector('.msg-assistant:last-child');
            if (thinking) thinking.remove();
            chatBox.innerHTML += `<div class="msg-assistant text-danger">Error: ${e.message}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });

    // Auto-refresh library every 15s
    setInterval(loadVideos, 15000);
    </script>
</body>
</html>
