<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analysis</title>
    <link rel="stylesheet" href="/static/css/dark-theme.css">
    <style>
        .video-card { cursor: pointer; transition: transform 0.1s; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: var(--space-sm) var(--space-md); margin-bottom: var(--space-xs); }
        .video-card:hover { transform: translateY(-2px); background: var(--surface-hover); }
        .video-card.selected { background: var(--primary) !important; color: #000; }
        #chat-box { height: 400px; overflow-y: auto; background: var(--surface); border-radius: 8px; padding: 16px; }
        .msg-user { color: var(--accent); }
        .msg-assistant { color: var(--text-secondary); }
        .loading { opacity: 0.6; pointer-events: none; }
        pre { white-space: pre-wrap; }
        .btn-primary { background: #0dcaf0; border-color: #0dcaf0; color: #000; font-weight: 600; }
        .btn-primary:hover { background: #0bb7d9; border-color: #0bb7d9; color: #000; }
        .btn-outline-info { border-color: #0dcaf0; color: #0dcaf0; }
        .btn-outline-info:hover { background: #0dcaf0; color: #000; }
        .text-info { color: var(--info); }
        .text-success { color: var(--success); }
        .text-danger { color: var(--error); }
        .badge-processing { background: #ffc107; color: #000; }
        .badge-complete { background: #198754; }
        .badge-error { background: #dc3545; }
        #upload-progress { transition: all 0.3s; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <header class="container">
        <div class="flex items-center justify-between flex-wrap gap-sm" style="padding:var(--space-md) 0;">
            <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:var(--space-sm);font-weight:700;color:var(--text);font-size:var(--text-lg);">
                &#x1f3a5; Video Analysis
            </a>
            <nav class="flex gap-sm">
                <a class="tab-btn active" href="/">Home</a>
                <a class="tab-btn" href="/settings">Settings</a>
                <a class="tab-btn" href="/stream">Live Stream</a>
                <a class="tab-btn" href="/models">Models</a>
            </nav>
            <span class="badge ready" id="status-badge">Starting...</span>
        </div>
    </header>

    <main class="container app-main">
        <div class="flex gap-md" style="flex-wrap: wrap;">
            <!-- Left column: Upload + Library -->
            <div style="flex: 0 0 32%; min-width: 280px;">
                <!-- Upload card -->
                <div class="card mb-md">
                    <div>
                        <h5 class="card-title">Upload Video</h5>
                        <form id="upload-form">
                            <div class="mb-sm">
                                <input type="file" id="video-file" accept="video/*">
                            </div>
                            <div class="text-muted text-sm mb-sm">Or paste a YouTube URL:</div>
                            <div class="mb-sm">
                                <input type="url" id="youtube-url" placeholder="https://youtube.com/watch?v=...">
                            </div>
                            <button type="submit" class="btn btn-primary btn-sm w-full" id="upload-btn">
                                <span id="upload-btn-text">Process</span>
                                <span id="upload-spinner" class="spinner hidden" role="status"></span>
                            </button>
                        </form>
                        <div id="upload-progress" class="mt-sm text-sm" style="display:none;"></div>
                    </div>
                </div>

                <!-- Library card -->
                <div class="card">
                    <div>
                        <div class="flex items-center justify-between mb-sm">
                            <h5 class="card-title mb-0">Video Library</h5>
                            <button class="btn btn-sm btn-secondary" onclick="loadVideos()" title="Refresh">&#x21bb;</button>
                        </div>
                        <div id="video-list" style="max-height: 500px; overflow-y: auto;">
                            <div class="text-muted text-sm" style="padding: 0.5rem 0;">No videos yet</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right column: Video details + Chat -->
            <div style="flex: 1; min-width: 300px;">
                <div class="card">
                    <div>
                        <h5 class="card-title" id="video-title">Select a video</h5>
                        <div id="video-info" class="text-sm text-muted mb-sm"></div>
                        <div id="video-summary" class="mb-md text-sm"></div>

                        <h6 class="mt-md">Chat about this video</h6>
                        <div id="chat-box">
                            <div class="text-muted text-sm">Process a video to start asking questions.</div>
                        </div>
                        <form id="chat-form" class="mt-sm">
                            <div class="flex gap-sm">
                                <input type="text" class="flex-1" id="chat-input" placeholder="Ask about the video..." disabled>
                                <button class="btn btn-sm btn-outline-info" type="submit" disabled>Ask</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
    let currentVideoId = null;
    let appSettings = {};

    // ── Health check ──────────────────────────────────────────────────
    fetch('/api/health').then(r => r.json()).then(d => {
        document.getElementById('status-badge').textContent = d.status === 'ok' ? 'Online' : 'Error';
        document.getElementById('status-badge').className = 'badge success';
    }).catch(() => {
        document.getElementById('status-badge').textContent = 'Offline';
        document.getElementById('status-badge').className = 'badge error';
    });

    // ── Load settings on startup ──────────────────────────────────────
    async function loadSettings() {
        try {
            const res = await fetch('/api/settings');
            appSettings = await res.json();
        } catch (e) {
            console.warn('Failed to load settings:', e);
        }
    }
    loadSettings();

    // ── Video library ─────────────────────────────────────────────────
    async function loadVideos() {
        try {
            const res = await fetch('/api/videos');
            const videos = await res.json();
            const list = document.getElementById('video-list');
            if (videos.length === 0) {
                list.innerHTML = '<div class="text-muted text-sm" style="padding:0.5rem 0;">No videos yet</div>';
                return;
            }
            list.innerHTML = videos.map(v => {
                const isSelected = v.video_id === currentVideoId;
                const statusClass = v.has_analysis ? 'success' : 'warning';
                const statusText = v.has_analysis ? 'Done' : 'Proc.';
                return `
                    <div class="video-card${isSelected ? ' selected' : ''}"
                         onclick="selectVideo('${v.video_id}')">
                        <div class="flex items-center justify-between" style="margin-bottom:0.25rem;">
                            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:0.5rem;">${v.filename}</span>
                            <span class="badge ${statusClass}" style="flex-shrink:0;">${statusText}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-muted text-sm">${v.duration.toFixed(0)}s</span>
                            <span class="text-muted text-sm">${v.num_frames} frames</span>
                        </div>
                    </div>
                `;
            }).join('');
        } catch(e) {
            console.error('Failed to load videos', e);
        }
    }
    loadVideos();

    // ── Select video ──────────────────────────────────────────────────
    async function selectVideo(videoId) {
        currentVideoId = videoId;
        document.getElementById('chat-input').disabled = false;
        document.querySelector('#chat-form button').disabled = false;

        try {
            const res = await fetch(`/api/videos/${videoId}`);
            const v = await res.json();

            document.getElementById('video-title').textContent = v.filename || videoId;
            document.getElementById('video-info').innerHTML = `
                Duration: ${(v.duration || 0).toFixed(1)}s |
                Transcript: ${(v.transcript || []).length} segments |
                Frames: ${(v.frames || []).length}
            `;
            document.getElementById('video-summary').innerHTML = v.llm_summary
                ? `<strong>Summary:</strong><br>${v.llm_summary.replace(/\n/g, '<br>')}`
                : '';
            document.getElementById('chat-box').innerHTML = '<div class="text-muted text-sm">Ask a question about this video.</div>';

            // Highlight selected
            document.querySelectorAll('.video-card').forEach(el => el.classList.remove('selected'));
            const selected = Array.from(document.querySelectorAll('.video-card')).find(el =>
                el.getAttribute('onclick') && el.getAttribute('onclick').includes(videoId)
            );
            if (selected) selected.classList.add('selected');
        } catch(e) {
            console.error('Failed to load video', e);
        }
    }

    // ── Upload form ───────────────────────────────────────────────────
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = document.getElementById('video-file').files[0];
        const url = document.getElementById('youtube-url').value.trim();
        const btn = document.getElementById('upload-btn');
        const btnText = document.getElementById('upload-btn-text');
        const spinner = document.getElementById('upload-spinner');
        const progress = document.getElementById('upload-progress');

        if (!file && !url) return;

        // Disable button and show spinner
        btn.disabled = true;
        spinner.classList.remove('hidden');
        if (url) {
            // YouTube URL mode — first import, then process
            progress.style.display = 'block';
            progress.className = 'mt-sm text-sm text-info';
            progress.textContent = 'Downloading video from URL...';

            try {
                const importRes = await fetch('/api/import-url', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url }),
                });
                if (!importRes.ok) {
                    const err = await importRes.json().catch(() => ({}));
                    throw new Error(err.detail || 'Import failed');
                }
                const importData = await importRes.json();

                progress.textContent = 'Processing video...';

                const processRes = await fetch('/api/videos/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        video_path: importData.path,
                        video_id: importData.video_id,
                    })
                });
                const result = await processRes.json();
                if (result.status === 'complete') {
                    progress.className = 'mt-sm text-sm text-success';
                    progress.textContent = 'Complete!';
                    loadVideos();
                    selectVideo(result.video_id);
                } else {
                    progress.className = 'mt-sm text-sm text-danger';
                    progress.textContent = result.error || 'Processing failed';
                }
            } catch(e) {
                progress.className = 'mt-sm text-sm text-danger';
                progress.textContent = 'Error: ' + e.message;
            }
        } else if (file) {
            // File upload
            const formData = new FormData();
            formData.append('file', file);

            progress.style.display = 'block';
            progress.className = 'mt-sm text-sm text-info';
            progress.textContent = 'Uploading...';

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();

                progress.textContent = 'Processing video...';

                const processRes = await fetch('/api/videos/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        video_path: data.path,
                        video_id: data.video_id,
                    })
                });
                const result = await processRes.json();

                if (result.status === 'complete') {
                    progress.className = 'mt-sm text-sm text-success';
                    progress.textContent = 'Complete!';
                } else {
                    progress.className = 'mt-sm text-sm text-danger';
                    progress.textContent = result.error || 'Processing failed';
                }
                loadVideos();
                if (result.video_id) selectVideo(result.video_id);
            } catch(e) {
                progress.className = 'mt-sm text-sm text-danger';
                progress.textContent = 'Error: ' + e.message;
            }
        }

        btn.disabled = false;
        spinner.classList.add('hidden');
    });

    // ── Chat form ─────────────────────────────────────────────────────
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentVideoId) return;

        const input = document.getElementById('chat-input');
        const question = input.value.trim();
        if (!question) return;

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg-user"><strong>You:</strong> ${question}</div>`;
        input.value = '';
        chatBox.innerHTML += `<div class="msg-assistant"><em>Thinking...</em></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const formData = new FormData();
            formData.append('question', question);
            formData.append('video_id', currentVideoId);

            const res = await fetch('/api/chat', { method: 'POST', body: formData });
            const data = await res.json();

            // Replace "Thinking..." placeholder
            const thinking = chatBox.querySelector('.msg-assistant:last-child');
            if (thinking) thinking.remove();
            chatBox.innerHTML += `<div class="msg-assistant"><strong>AI:</strong> ${(data.answer || data.error || 'No response').replace(/\n/g, '<br>')}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {
            const thinking = chatBox.querySelector('.msg-assistant:last-child');
            if (thinking) thinking.remove();
            chatBox.innerHTML += `<div class="msg-assistant" style="color:var(--error);">Error: ${e.message}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });

    // Auto-refresh library every 15s
    setInterval(loadVideos, 15000);
    </script>
</body>
</html>
