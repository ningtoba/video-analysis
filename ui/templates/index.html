<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 20px; }
        .video-card { cursor: pointer; transition: transform 0.1s; }
        .video-card:hover { transform: translateY(-2px); }
        #chat-box { height: 400px; overflow-y: auto; background: #1a1d23; border-radius: 8px; padding: 16px; }
        .msg-user { color: #0dcaf0; }
        .msg-assistant { color: #adb5bd; }
        .loading { opacity: 0.6; pointer-events: none; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-dark bg-dark rounded-3 mb-4 px-3">
            <span class="navbar-brand mb-0 h1">🎥 Video Analysis</span>
            <span class="badge bg-secondary" id="status-badge">Starting...</span>
        </nav>

        <div class="row">
            <!-- Upload -->
            <div class="col-md-4 mb-3">
                <div class="card bg-dark border-secondary">
                    <div class="card-body">
                        <h5>Upload Video</h5>
                        <form id="upload-form">
                            <input type="file" class="form-control form-control-sm mb-2" id="video-file" accept="video/*">
                            <p class="text-muted small">Or paste a YouTube URL:</p>
                            <input type="url" class="form-control form-control-sm mb-2" id="youtube-url" placeholder="https://youtube.com/watch?v=...">
                            <button type="submit" class="btn btn-primary btn-sm w-100">Process</button>
                        </form>
                        <div id="upload-progress" class="mt-2 small text-info" style="display:none;"></div>
                    </div>
                </div>

                <!-- Library -->
                <div class="card bg-dark border-secondary mt-3">
                    <div class="card-body">
                        <h5>Video Library</h5>
                        <div id="video-list" class="list-group list-group-flush">
                            <div class="text-muted small">No videos yet</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Video details + Chat -->
            <div class="col-md-8 mb-3">
                <div class="card bg-dark border-secondary">
                    <div class="card-body">
                        <h5 id="video-title">Select a video</h5>
                        <div id="video-info" class="small text-muted mb-2"></div>
                        <div id="video-summary" class="mb-3 small"></div>

                        <h6>Chat</h6>
                        <div id="chat-box">
                            <div class="text-muted small">Process a video to start asking questions.</div>
                        </div>
                        <form id="chat-form" class="mt-2">
                            <div class="input-group">
                                <input type="text" class="form-control form-control-sm" id="chat-input" placeholder="Ask about the video..." disabled>
                                <button class="btn btn-sm btn-outline-info" type="submit" disabled>Ask</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    let currentVideoId = null;

    // Health check
    fetch('/health').then(r => r.json()).then(d => {
        document.getElementById('status-badge').textContent = d.status === 'ok' ? 'Online' : 'Error';
    }).catch(() => {
        document.getElementById('status-badge').textContent = 'Offline';
    });

    // Load video list
    async function loadVideos() {
        try {
            const res = await fetch('/api/videos');
            const videos = await res.json();
            const list = document.getElementById('video-list');
            if (videos.length === 0) {
                list.innerHTML = '<div class="text-muted small">No videos yet</div>';
                return;
            }
            list.innerHTML = videos.map(v => `
                <button class="list-group-item list-group-item-action bg-dark text-light border-secondary video-card py-2"
                        onclick="selectVideo('${v.video_id}')">
                    <small>${v.filename}</small>
                    <span class="badge bg-secondary float-end">${v.duration.toFixed(0)}s</span>
                </button>
            `).join('');
        } catch(e) {
            console.error('Failed to load videos', e);
        }
    }
    loadVideos();

    // Select video
    async function selectVideo(videoId) {
        currentVideoId = videoId;
        document.getElementById('chat-input').disabled = false;
        document.querySelector('#chat-form button').disabled = false;

        const res = await fetch(`/api/videos/${videoId}`);
        const v = await res.json();

        document.getElementById('video-title').textContent = v.filename || videoId;
        document.getElementById('video-info').innerHTML = `
            Duration: ${v.duration.toFixed(1)}s |
            Transcript: ${(v.transcript || []).length} segments |
            Frames: ${(v.frames || []).length}
        `;
        document.getElementById('video-summary').innerHTML = v.llm_summary
            ? `<strong>Summary:</strong><br>${v.llm_summary.replace(/\n/g, '<br>')}`
            : '';
        document.getElementById('chat-box').innerHTML = '<div class="text-muted small">Ask a question about this video.</div>';
    }

    // Upload form
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = document.getElementById('video-file').files[0];
        const url = document.getElementById('youtube-url').value;

        if (url) {
            window.location.href = `/?url=${encodeURIComponent(url)}`;
            return;
        }
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        const progress = document.getElementById('upload-progress');
        progress.style.display = 'block';
        progress.textContent = 'Uploading...';

        try {
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();

            progress.textContent = 'Processing...';

            const processRes = await fetch('/api/videos/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ video_path: data.path, video_id: data.video_id })
            });
            const result = await processRes.json();

            progress.textContent = result.status === 'complete' ? '✅ Complete!' : `❌ ${result.error || 'Failed'}`;
            loadVideos();
            if (result.video_id) selectVideo(result.video_id);
        } catch(e) {
            progress.textContent = '❌ Error: ' + e.message;
        }
    });

    // Chat form
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!currentVideoId) return;

        const input = document.getElementById('chat-input');
        const question = input.value.trim();
        if (!question) return;

        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg-user"><strong>You:</strong> ${question}</div>`;
        input.value = '';
        chatBox.innerHTML += `<div class="msg-assistant"><em>Thinking...</em></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const formData = new FormData();
            formData.append('question', question);
            formData.append('video_id', currentVideoId);

            const res = await fetch('/api/chat', { method: 'POST', body: formData });
            const data = await res.json();

            // Replace "Thinking..." with answer
            chatBox.querySelector('.msg-assistant:last-child').remove();
            chatBox.innerHTML += `<div class="msg-assistant"><strong>AI:</strong> ${(data.answer || data.error || 'No response').replace(/\n/g, '<br>')}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {
            chatBox.querySelector('.msg-assistant:last-child').remove();
            chatBox.innerHTML += `<div class="msg-assistant text-danger">Error: ${e.message}</div>`;
        }
    });
    </script>
</body>
</html>
